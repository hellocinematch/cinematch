  <g transform="translate(56, 196)">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120" role="presentation" aria-hidden="true">
      <text x="200" y="80" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" letter-spacing="-3">
        <tspan fill="#f0ebe0">cinem</tspan><tspan fill="#8B1A1A">a</tspan><tspan fill="#e8c96a">stro</tspan>
      </text>
      <text x="200" y="105" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="4" fill="#555">YOUR PERSONAL FILM MAESTRO</text>
    </svg>
  </g>
</svg>
